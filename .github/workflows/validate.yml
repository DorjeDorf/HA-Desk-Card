name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - name: HACS validation
        # Pinned to a full commit SHA (supply-chain hardening; repo enforces
        # sha_pinning_required). This is hacs/action main @ 2026-06-08.
        # To update: bump to the newer hacs/action main SHA.
        uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa
        with:
          category: plugin
